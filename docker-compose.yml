services:
  # ── Ollama — local LLM runtime (GPU preferred) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: uav-ollama
    ports:
      - "11000:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    # command is already set via CMD in the ollama image
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── ChromaDB — vector store for SOP RAG ───────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: uav-chroma
    ports:
      - "9001:8000"
    volumes:
      - chroma_data:/chroma/chroma/.chroma_root
    environment:
      IS_PERSISTENT: "TRUE"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || curl -sf http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: uav-backend
    ports:
      - "9000:8000"
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./uav.db"
      OLLAMA_BASE_URL: "http://ollama:11434"
      CHROMA_URL: "http://chromadb:8000"
      MODEL_VISION: "gemma4-e2b"
      MODEL_DECISION: "gemma4-e2b"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      # Allow all origins for development
      BACKEND_CORS_ORIGINS: "http://localhost:4000,http://localhost:4001,http://localhost:4002,http://localhost:9000,http://frontend:3000,http://frontend:3001,http://frontend:3002"
    depends_on:
      ollama:
        condition: service_started
      chromadb:
        condition: service_started
    volumes:
      - chroma_data:/chroma/chroma/.chroma_root:ro
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (dev server) ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: uav-frontend
    ports:
      - "4000:3000"
      - "4001:3001"
      - "4002:3002"
    environment:
      # Backend API - use localhost with external port for browser access
      NEXT_PUBLIC_API_BASE: "http://localhost:9000"
      # Dashboard URL for showcase (external ports)
      NEXT_PUBLIC_DASHBOARD_URL: "http://localhost:4001"
      # Showcase URL for admin/dashboard (external ports)
      NEXT_PUBLIC_SHOWCASE_URL: "http://localhost:4000"
      # Admin URL for navigation links
      NEXT_PUBLIC_ADMIN_URL: "http://localhost:4002"
    depends_on:
      - backend
    # Add host.docker.internal for Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Mount source for development, but keep node_modules inside container
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
      - /app/apps/dashboard/node_modules
      - /app/apps/showcase/node_modules
      - /app/apps/admin/node_modules

volumes:
  ollama_data:
  chroma_data:
