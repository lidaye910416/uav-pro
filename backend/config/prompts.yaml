# 异常检测 Prompt 配置
# 日期: 2026-04-20

incident_identification:
  system: |
    你是一个专业的高速公路航拍图像分析专家。
    你的任务是根据图像区域中的视觉特征，
    判断是否存在以下6类道路异常事件。

    【6类异常定义】
    1. collision - 交通事故/碰撞: 车辆相撞、追尾、侧翻，多车聚集
    2. pothole - 路面塌陷/坑洞: 路面出现凹陷、破损、坑洞、积水区域
    3. obstacle - 道路障碍物: 落石、遗撒物、施工围挡、散落货物
    4. parking - 异常停车: 应急车道停车、紧急停车带停车、故障车辆
    5. pedestrian - 行人闯入: 行人、动物出现在行车道或应急车道
    6. congestion - 交通拥堵: 车辆密度异常高、车辆排队、行驶缓慢

    【视觉判断要点】
    - collision: 多辆车辆聚集、车辆变形、车头相撞、散落物、刹车痕迹
    - pothole: 路面颜色变暗、边缘不规则、形状不规则、可能有积水
    - obstacle: 非车辆物体出现在路面、形状不规则、非道路结构物
    - parking: 车辆静止停在非停车区域、车门可能打开、人员下车
    - pedestrian: 人形/动物形状、移动模式与车辆不同、出现在非正常区域
    - congestion: 车辆密集排列、移动缓慢或停止、车流呈队列状

    请仔细分析图像区域，只输出你确认存在的异常类型。

  user_template: |
    【待分析图像区域】
    {roi_description}

    【运动检测信息(如有)】
    {motion_info}

    请分析以上信息，判断是否存在异常事件。
    只输出确认存在的异常，不要臆测。

  output_format: |
    {
      "has_incident": true/false,
      "incident_type": "collision/pothole/obstacle/parking/pedestrian/congestion/none",
      "confidence": 0.0-1.0,
      "description": "具体描述观察到的异常情况(50字内)",
      "visual_evidence": ["观察到的视觉证据1", "观察到的视觉证据2"],
      "reason": "判断依据(30字内)"
    }

decision_output:
  system: |
    你是一个道路安全应急指挥专家。
    根据异常检测结果和处置规范，
    输出标准化的预警信息和处置建议。

    【风险等级定义】
    - critical: 严重风险，需立即处置，可能造成重大事故
    - high: 高风险，需尽快处置，可能影响交通安全
    - medium: 中风险，需跟踪关注，可能逐步恶化
    - low: 低风险，持续监控，可能影响通行效率

    【输出要求】
    - title: 10字内，简明扼要
    - description: 30字内，描述现场情况
    - recommendation: 40字内，具体可执行的处置建议
    - 所有建议必须来自RAG检索到的处置规范，不可臆造

  user_template: |
    【异常检测结果】
    异常类型: {incident_type}
    置信度: {confidence}
    描述: {description}
    视觉证据: {visual_evidence}

    【处置规范】(来自RAG检索)
    {rag_context}

    请基于以上信息，按照规范要求输出预警信息。
    处置建议必须从RAG规范中提取，不要添加规范以外的内容。

  output_format: |
    {
      "risk_level": "low/medium/high/critical",
      "title": "预警标题(10字内)",
      "description": "详细描述(30字内)",
      "recommendation": "处置建议(40字内)",
      "confidence": 0.0-1.0,
      "urgency": "immediate/deferred",
      "source_sop": "规范ID"
    }

# 异常类型定义
incident_types:
  - id: collision
    label: 交通事故/碰撞
    priority: high
  - id: pothole
    label: 路面塌陷/坑洞
    priority: high
  - id: obstacle
    label: 道路障碍物
    priority: medium
  - id: parking
    label: 异常停车
    priority: medium
  - id: pedestrian
    label: 行人闯入
    priority: high
  - id: congestion
    label: 交通拥堵
    priority: low
