ollama:
  base_url: "http://localhost:11434"
  timeout_sec: 30

# Pipeline 运行模式
# single: Gemma 4 E2B（多模态）一站式视觉识别 + 决策生成 + RAG
# dual:   llava:7b（视觉识别） + deepseek-r1:1.5b（决策生成） + RAG
pipeline_mode: "single"

model:
  # ── 单模型模式（Gemma 4 E2B）───────────────
  # 本地 GGUF 文件加载：ollama create gemma4-e2b -f /Users/jasonlee/UAV_PRO/models/Modelfile.gemma-4-E2B
  gemma4_e2b: "gemma4-e2b"
  gemma4_e2b_gguf: "/Users/jasonlee/UAV_PRO/models/gemma-4-E2B-it-Q8_0.gguf"
  gemma4_e2b_modelfile: "/Users/jasonlee/UAV_PRO/models/Modelfile.gemma-4-E2B"

  # ── 双模型模式 ─────────────────────────────
  vision: "llava:7b"          # 多模态视觉理解模型
  decision: "deepseek-r1:1.5b"  # 推理决策模型
